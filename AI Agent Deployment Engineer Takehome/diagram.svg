<svg width="100%" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Bedtime Story Generator — System Flow</title>
<desc>Flowchart showing user input flowing through classifier, outline generation with judge loop, story generation with judge loop, to final output</desc>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- background -->
<rect width="680" height="780" fill="#ffffff"/>

<!-- USER INPUT -->
<rect x="240" y="30" width="200" height="44" rx="8" fill="#f5f5f5" stroke="#222" stroke-width="1.5"/>
<text x="340" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#111">User input</text>

<!-- arrow -->
<line x1="340" y1="74" x2="340" y2="106" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- CLASSIFIER -->
<rect x="200" y="108" width="280" height="56" rx="8" fill="#ede9fe" stroke="#222" stroke-width="1.5"/>
<text x="340" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#111">Classifier</text>
<text x="340" y="151" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444">age group · story category</text>

<!-- arrow -->
<line x1="340" y1="164" x2="340" y2="196" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- OUTLINE LOOP DASHED BOX -->
<rect x="60" y="198" width="560" height="192" rx="10" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="76" y="218" font-family="Arial, sans-serif" font-size="11" fill="#666">Outline loop — max 2 iterations</text>

<!-- OUTLINE GENERATOR -->
<rect x="200" y="226" width="280" height="56" rx="8" fill="#ccfbf1" stroke="#222" stroke-width="1.5"/>
<text x="340" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#111">Outline generator</text>
<text x="340" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444">3-act structure</text>

<!-- arrow down -->
<line x1="340" y1="282" x2="340" y2="316" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- OUTLINE JUDGE -->
<rect x="200" y="318" width="280" height="56" rx="8" fill="#ccfbf1" stroke="#222" stroke-width="1.5"/>
<text x="340" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#111">Outline judge</text>
<text x="340" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444">score / 10 · CoT reasoning</text>

<!-- fail loop left side -->
<path d="M200 346 L128 346 L128 254 L200 254" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<text x="90" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666" transform="rotate(-90,90,308)">fail + critique</text>

<!-- pass label + arrow down -->
<line x1="340" y1="374" x2="340" y2="406" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="358" y="393" font-family="Arial, sans-serif" font-size="11" fill="#666">pass ≥ 8</text>

<!-- STORY LOOP DASHED BOX -->
<rect x="60" y="408" width="560" height="212" rx="10" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="76" y="428" font-family="Arial, sans-serif" font-size="11" fill="#666">Story loop — max 2 iterations</text>

<!-- STORY GENERATOR -->
<rect x="200" y="438" width="280" height="56" rx="8" fill="#ffe4d6" stroke="#222" stroke-width="1.5"/>
<text x="340" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#111">Story generator</text>
<text x="340" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444">full story from approved outline</text>

<!-- arrow down -->
<line x1="340" y1="494" x2="340" y2="526" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- STORY JUDGE -->
<rect x="200" y="528" width="280" height="68" rx="8" fill="#ffe4d6" stroke="#222" stroke-width="1.5"/>
<text x="340" y="549" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#111">Story judge panel</text>
<text x="340" y="567" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444">age appropriateness · structure</text>
<text x="340" y="584" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444">engagement · avg score / 10</text>

<!-- fail loop left side -->
<path d="M200 562 L128 562 L128 466 L200 466" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<text x="90" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666" transform="rotate(-90,90,520)">fail + critique</text>

<!-- pass label + arrow down -->
<line x1="340" y1="596" x2="340" y2="628" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="358" y="615" font-family="Arial, sans-serif" font-size="11" fill="#666">pass ≥ 8</text>

<!-- FINAL OUTPUT -->
<rect x="200" y="630" width="280" height="56" rx="8" fill="#f5f5f5" stroke="#222" stroke-width="1.5"/>
<text x="340" y="653" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#111">Final story output</text>
<text x="340" y="673" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444">printed to user</text>

</svg>
